<!DOCTYPE html>
<html>
<head><title>OHS Site Observer — Loading...</title></head>
<body>
<p>Capturing your location, please wait...</p>
<script>
  const FORM_ID = "YOUR_GOOGLE_FORM_ID_HERE";
  const GPS_ENTRY_ID = "entry.XXXXXXXXX"; // your GPS field entry ID

  navigator.geolocation.getCurrentPosition(function(pos) {
    const coords = pos.coords.latitude.toFixed(6) + ", " + pos.coords.longitude.toFixed(6);
    const url = "https://docs.google.com/forms/d/" + FORM_ID + 
                "/viewform?usp=pp_url&" + GPS_ENTRY_ID + "=" + encodeURIComponent(coords);
    window.location.href = url;
  }, function(err) {
    alert("Could not get GPS. Please enable location and try again.");
  }, { enableHighAccuracy: true, timeout: 10000 });
</script>
</body>
</html>
